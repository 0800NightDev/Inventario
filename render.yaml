services:
  - type: web
    name: inventario-web
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn app:app -b 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventario-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.4

databases:
  - name: inventario-db
    databaseName: inventario
    user: admin
